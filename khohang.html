<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DANH MỤC SẢN PHẨM AIKYA 2026</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fb;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  color: #d32f2f;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* BUTTON */
button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.btn-orange { background: #ff7043; color: white; }
.btn-green { background: #43a047; color: white; }
.btn-gray { background: #777; color: white; }

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #d32f2f;
  color: white;
  padding: 10px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

tr:hover {
  background: #fff5f5;
}

#status {
  margin-bottom: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>📦 DANH MỤC SẢN PHẨM AIKYA 2026</h1>
</div>

<div class="card">
  <input id="search" placeholder="🔍 Tìm sản phẩm...">

  <button class="btn-orange" onclick="filterLow()">Tồn kho &lt; 50</button>
  <button class="btn-green" onclick="filterKM()">Có KM Tháng</button>
  <button class="btn-gray" onclick="resetFilter()">Tất cả</button>
</div>

<div class="card">
  <div id="status">Đang tải dữ liệu...</div>
  <div id="data"></div>
</div>

</div>

<script>

const API = "https://api.sheetbest.com/sheets/dcfb93e9-0641-40dc-8315-b8edf3ed0827";

let list = [];
let current = [];

// LOAD DATA
async function loadData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    if (!res.ok) throw new Error("Lỗi API");

    list = await res.json();
    current = list;

    document.getElementById("status").innerText = "✔ Đã tải dữ liệu";
    render(current);

  } catch (e) {
    document.getElementById("status").innerText = "❌ " + e.message;
  }
}

// RENDER
function render(arr) {
  if (arr.length === 0) {
    document.getElementById("data").innerHTML = "Không có dữ liệu";
    return;
  }

  let keys = Object.keys(arr[0]);
  let html = "<table>";

  // HEADER
  html += "<tr>";
  keys.forEach(k => html += "<th>" + k + "</th>");
  html += "</tr>";

  // DATA
  arr.forEach(row => {
    html += "<tr>";

    keys.forEach(k => {
      let val = row[k];

      // ✅ KM THÁNG (CHÍNH XÁC)
      if (k === "KM THÁNG") {
        if (val && val.trim() !== "") {
          html += `<td style="background:#d4edda;">${val}</td>`;
        } else {
          html += `<td>${val}</td>`;
        }
      }

      // ✅ TỒN KHO (HỘP) (CHÍNH XÁC)
      else if (k === "TỒN KHO (HỘP)") {
        let num = Number(val);

        if (num === 0) {
          html += `<td style="background:#f8c6c6;">${val}</td>`;
        } 
        else if (num < 50) {
          html += `<td style="background:#ffe0d6;">${val}</td>`;
        } 
        else {
          html += `<td>${val}</td>`;
        }
      }

      else {
        html += `<td>${val}</td>`;
      }
    });

    html += "</tr>";
  });

  html += "</table>";
  document.getElementById("data").innerHTML = html;
}

// SEARCH
document.getElementById("search").addEventListener("input", function() {
  let key = this.value.toLowerCase();

  current = list.filter(row =>
    Object.values(row).some(v =>
      String(v).toLowerCase().includes(key)
    )
  );

  render(current);
});

// FILTER TỒN KHO
function filterLow() {
  current = list.filter(row =>
    Number(row["TỒN KHO (HỘP)"]) < 50
  );
  render(current);
}

// FILTER KM THÁNG
function filterKM() {
  current = list.filter(row =>
    row["KM THÁNG"] && row["KM THÁNG"].trim() !== ""
  );
  render(current);
}

// RESET
function resetFilter() {
  current = list;
  render(current);
}

// RUN
loadData();

</script>

</body>
</html>
