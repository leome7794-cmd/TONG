<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DANH MỤC SẢN PHẨM AIKYA 2026</title>

<style>
body {
  font-family: Arial;
  background: #f4f6fb;
  margin: 0;
  padding: 15px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

h1 {
  text-align: center;
  color: #d32f2f;
}

/* CARD */
.card {
  background: white;
  padding: 12px;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
  margin-bottom: 12px;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
}

/* BUTTON */
button {
  padding: 7px 12px;
  border: none;
  border-radius: 8px;
  margin: 4px;
  cursor: pointer;
}

.btn-orange { background:#ff7043; color:white; }
.btn-green { background:#43a047; color:white; }
.btn-gray { background:#777; color:white; }

/* TABLE */
.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}

th {
  background: #d32f2f;
  color: white;
  padding: 10px;
  position: sticky;
  top: 0;
  cursor: pointer;
}

td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

tr:hover {
  background: #fff5f5;
}

/* BADGE */
.badge {
  padding: 4px 8px;
  border-radius: 8px;
  font-weight: bold;
}

/* 🔥 ĐỎ ĐẬM CHO HẾT HÀNG */
.red { 
  background:#ff4d4f; 
  color:white;
  font-weight:bold;
}

.orange { background:#ffe0d6; }
.green { background:#d4edda; }

/* STATUS */
#status {
  font-weight: bold;
  margin-bottom: 8px;
}

/* STATS */
.stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.stat-box {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  flex: 1;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="container">

<h1>📦 DANH MỤC SẢN PHẨM AIKYA 2026</h1>

<div class="card">
  <input id="search" placeholder="🔍 Tìm sản phẩm...">

  <button class="btn-orange" onclick="filterLow()">Tồn kho < 50</button>
  <button class="btn-green" onclick="filterKM()">Có KM Tháng</button>
  <button class="btn-gray" onclick="resetFilter()">Tất cả</button>
</div>

<div class="stats">
  <div class="stat-box">Tổng SP: <b id="total"></b></div>
  <div class="stat-box">Sắp hết: <b id="low"></b></div>
  <div class="stat-box">Hết hàng: <b id="out"></b></div>
</div>

<div class="card">
  <div id="status">Đang tải dữ liệu...</div>
  <div class="table-wrap">
    <div id="data"></div>
  </div>
</div>

</div>

<script>

const API = "https://api.sheetbest.com/sheets/dcfb93e9-0641-40dc-8315-b8edf3ed0827";

let list = [];
let current = [];
let sortKey = "";
let sortAsc = true;

// LOAD DATA
async function loadData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    list = await res.json();
    current = list;

    document.getElementById("status").innerText = "✔ Đã tải dữ liệu";

    updateStats();
    render(current);

  } catch {
    document.getElementById("status").innerText = "❌ Lỗi load dữ liệu";
  }
}

// THỐNG KÊ
function updateStats() {
  let total = list.length;
  let low = 0;
  let out = 0;

  list.forEach(r => {
    let num = parseInt(String(r["TỒN KHO (HỘP)"]).replace(/[^0-9]/g, "")) || 0;
    if (num === 0) out++;
    else if (num < 50) low++;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("low").innerText = low;
  document.getElementById("out").innerText = out;
}

// RENDER TABLE
function render(arr) {
  if (!arr.length) return;

  let keys = Object.keys(arr[0]);
  let html = "<table><tr>";

  keys.forEach(k => {
    let icon = (k === sortKey) ? (sortAsc ? " ▲" : " ▼") : "";
    html += `<th onclick="sort('${k}')">${k}${icon}</th>`;
  });

  html += "</tr>";

  arr.forEach(row => {
    html += "<tr>";

    keys.forEach(k => {
      let val = row[k];

      // KM THÁNG
      if (k === "KM THÁNG") {
        if (val && val.trim() !== "") {
          html += `<td class="green">${val}</td>`;
        } else {
          html += `<td>${val}</td>`;
        }
      }

      // TỒN KHO
      else if (k === "TỒN KHO (HỘP)") {

        let num = parseInt(String(val).replace(/[^0-9]/g, "")) || 0;

        if (num === 0) {
          html += `<td><span class="badge red">Hết hàng</span></td>`;
        } 
        else if (num < 50) {
          html += `<td><span class="badge orange">${num}</span></td>`;
        } 
        else {
          html += `<td>${num}</td>`;
        }
      }

      else {
        html += `<td>${val}</td>`;
      }

    });

    html += "</tr>";
  });

  html += "</table>";
  document.getElementById("data").innerHTML = html;
}

// SEARCH
document.getElementById("search").addEventListener("input", function() {
  let key = this.value.toLowerCase();

  current = list.filter(r =>
    Object.values(r).some(v =>
      String(v).toLowerCase().includes(key)
    )
  );

  render(current);
});

// FILTER
function filterLow() {
  current = list.filter(r => {
    let num = parseInt(String(r["TỒN KHO (HỘP)"]).replace(/[^0-9]/g, "")) || 0;
    return num < 50;
  });
  render(current);
}

function filterKM() {
  current = list.filter(r =>
    r["KM THÁNG"] && r["KM THÁNG"].trim() !== ""
  );
  render(current);
}

function resetFilter() {
  current = list;
  render(current);
}

// SORT
function sort(key) {

  if (sortKey === key) {
    sortAsc = !sortAsc;
  } else {
    sortKey = key;
    sortAsc = true;
  }

  current.sort((a, b) => {

    let A = a[key];
    let B = b[key];

    if (key === "TỒN KHO (HỘP)") {
      A = parseInt(String(A).replace(/[^0-9]/g, "")) || 0;
      B = parseInt(String(B).replace(/[^0-9]/g, "")) || 0;
    }

    let numA = parseFloat(A);
    let numB = parseFloat(B);

    if (!isNaN(numA) && !isNaN(numB)) {
      return sortAsc ? numA - numB : numB - numA;
    }

    return sortAsc
      ? String(A).localeCompare(String(B))
      : String(B).localeCompare(String(A));
  });

  render(current);
}

// RUN
loadData();

</script>

</body>
</html>
