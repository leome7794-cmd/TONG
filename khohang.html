<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tra cứu kho hàng</title>

<style>
body {
  font-family: Arial;
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  font-size: 16px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: left;
}

th {
  background-color: #f2f2f2;
}

.low {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>TRA CỨU KHO HÀNG</h1>

<input id="search" placeholder="Tìm sản phẩm...">

<select id="filter">
  <option value="">Tất cả</option>
  <option value="low">Sắp hết hàng</option>
</select>

<div id="status">Đang tải dữ liệu...</div>
<div id="data"></div>

<script>

// ✅ API CHUẨN (KHÔNG /TONG)
const API = "https://api.sheetbest.com/sheets/dcfb93e9-0641-40dc-8315-b8edf3ed0827";

let list = [];

// 🔄 LOAD DATA
async function loadData() {
  try {
    const res = await fetch(API + "?t=" + Date.now());

    if (!res.ok) throw new Error("Không lấy được dữ liệu");

    const json = await res.json();

    list = json;

    document.getElementById("status").innerText = "✔ Đã tải dữ liệu";
    render(list);

  } catch (e) {
    document.getElementById("status").innerText = "❌ Lỗi: " + e.message;
  }
}

// 📊 HIỂN THỊ BẢNG
function render(arr) {
  if (arr.length === 0) {
    document.getElementById("data").innerHTML = "Không có dữ liệu";
    return;
  }

  let keys = Object.keys(arr[0]);

  let html = "<table>";
  
  // header
  html += "<tr>";
  keys.forEach(k => {
    html += "<th>" + k + "</th>";
  });
  html += "</tr>";

  // data
  arr.forEach(row => {
    html += "<tr>";
    keys.forEach(k => {
      let val = row[k];

      if (k.toLowerCase().includes("ton") && Number(val) < 5) {
        html += `<td class="low">${val}</td>`;
      } else {
        html += "<td>" + val + "</td>";
      }
    });
    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("data").innerHTML = html;
}

// 🔍 TÌM KIẾM
document.getElementById("search").addEventListener("input", function() {
  let key = this.value.toLowerCase();

  let filtered = list.filter(row =>
    Object.values(row).some(v =>
      String(v).toLowerCase().includes(key)
    )
  );

  render(filtered);
});

// 🔽 LỌC TỒN KHO
document.getElementById("filter").addEventListener("change", function() {
  let val = this.value;

  let filtered = list;

  if (val === "low") {
    filtered = list.filter(row =>
      Object.keys(row).some(k =>
        k.toLowerCase().includes("ton") && Number(row[k]) < 5
      )
    );
  }

  render(filtered);
});

// 🚀 CHẠY
loadData();

</script>

</body>
</html>
