<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tra cứu sản phẩm</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

.item {
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h2>TRA CỨU SẢN PHẨM</h2>

<input id="search" placeholder="Nhập để tìm...">
<div id="list"></div>

<script>

const API = "https://api.sheetbest.com/sheets/99ace841-423e-4712-9cd7-3314702f8bf7/TONG";

let data = [];

fetch(API)
.then(res => res.json())
.then(res => {
  console.log("DATA:", res); // debug
  data = res;
  render(data);
})
.catch(err => {
  document.getElementById("list").innerHTML = "LỖI LOAD DỮ LIỆU";
  console.log(err);
});

function render(arr){
  let html = "";
  arr.forEach(row => {
    html += "<div class='item'>";
    for (let key in row) {
      html += "<div><b>" + key + ":</b> " + row[key] + "</div>";
    }
    html += "</div>";
  });
  document.getElementById("list").innerHTML = html;
}

document.getElementById("search").addEventListener("input", function(){
  const k = this.value.toLowerCase();
  const filtered = data.filter(row =>
    Object.values(row).some(v =>
      String(v).toLowerCase().includes(k)
    )
  );
  render(filtered);
});

</script>

</body>
</html>
